apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-reviewer
  namespace: claude-reviewer
  labels:
    app: claude-reviewer
spec:
  replicas: 1  # Keep at 1 to avoid concurrent state issues
  strategy:
    type: Recreate  # Ensure only one pod at a time
  selector:
    matchLabels:
      app: claude-reviewer
  template:
    metadata:
      labels:
        app: claude-reviewer
    spec:
      # Init container: seed config.yaml from ConfigMap to PVC on first run
      initContainers:
      - name: init-config
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
        - |
          if [ ! -f /app/data/config.yaml ]; then
            echo "[init] Seeding config.yaml from ConfigMap to data PVC..."
            cp /configmap/config.yaml /app/data/config.yaml
            echo "[init] Config seeded."
          else
            echo "[init] Config already exists on PVC, skipping seed."
          fi
        volumeMounts:
        - name: config-template
          mountPath: /configmap/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: data
          mountPath: /app/data

      containers:
      - name: reviewer
        image: ghcr.io/papayapos/papaya-reviewer:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        - containerPort: 3001
          name: dashboard
          protocol: TCP

        env:
        # Secrets from Secret
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: claude-reviewer-secrets
              key: GITHUB_TOKEN

        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: claude-reviewer-secrets
              key: WEBHOOK_SECRET

        - name: JIRA_TOKEN
          valueFrom:
            secretKeyRef:
              name: claude-reviewer-secrets
              key: JIRA_TOKEN

        - name: JIRA_EMAIL
          valueFrom:
            secretKeyRef:
              name: claude-reviewer-secrets
              key: JIRA_EMAIL

        - name: JIRA_BASE_URL
          valueFrom:
            secretKeyRef:
              name: claude-reviewer-secrets
              key: JIRA_BASE_URL

        # Claude CLI auto-update (set to "true" to enable)
        - name: CLAUDE_AUTO_UPDATE
          value: "false"

        volumeMounts:
        # Config is served from the data PVC (writable — dashboard can edit it)
        - name: data
          mountPath: /app/config.yaml
          subPath: config.yaml

        - name: data
          mountPath: /app/data

        # Claude CLI credentials persisted across restarts via PVC subPath
        - name: data
          mountPath: /home/node/.claude
          subPath: claude-home

        - name: data
          mountPath: /home/node/.claude.json
          subPath: claude-home/.claude.json

        - name: claude-root
          mountPath: /root/.claude

        # Claude OAuth session (injected via Secret, read-only)
        - name: claude-session
          mountPath: /root/.config/Claude
          readOnly: true

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        securityContext:
          runAsNonRoot: false
          runAsUser: 0  # Root — needed by claude CLI
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Needs write for /app/data

      imagePullSecrets:
      - name: docker-auths

      volumes:
      # ConfigMap used only by init container for first-run seeding
      - name: config-template
        configMap:
          name: claude-reviewer-config

      # All persistent data: review state, clones, config, Claude credentials
      - name: data
        persistentVolumeClaim:
          claimName: claude-reviewer-data

      # Claude CLI home for root user (ephemeral — only used for claude CLI internals)
      - name: claude-root
        emptyDir: {}

      # Claude OAuth session files (from Secret)
      - name: claude-session
        secret:
          secretName: claude-session

      restartPolicy: Always
