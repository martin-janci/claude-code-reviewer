apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-reviewer
  namespace: claude-reviewer
  annotations:
    cert-manager.io/issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-body-size: "6000m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "700"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "700"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "700"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - github.claude-reviewer.papayapos.dev
    secretName: wildcard-tls-production
  rules:
  - host: github.claude-reviewer.papayapos.dev
    http:
      paths:
      - path: /webhook
        pathType: Prefix
        backend:
          service:
            name: claude-reviewer
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: claude-reviewer
            port:
              number: 3001
