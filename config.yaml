mode: polling
polling:
  intervalSeconds: 30
webhook:
  port: 3000
  secret: ""
  path: /webhook
github:
  token: ""
repos:
  - owner: martin-janci
    repo: test-code-review
review:
  maxDiffLines: 5000
  skipDrafts: true
  skipWip: true
  commentTag: <!-- claude-code-review -->
  maxRetries: 3
  debouncePeriodSeconds: 10
  staleClosedDays: 7
  staleErrorDays: 30
  commentVerifyIntervalMinutes: 60
  maxReviewHistory: 20
  commentTrigger: ^\\s*/review\\s*$
  codebaseAccess: true
  cloneDir: data/clones
  cloneTimeoutMs: 120000
  reviewTimeoutMs: 600000
  reviewMaxTurns: 15
  staleWorktreeMinutes: 60
  excludePaths: []
  dryRun: false
  maxConcurrentReviews: 3
  confidenceThreshold: 0
  securityPaths:
    - "**/auth/**"
    - "**/crypto/**"
    - "**/security/**"
    - "**/*.env*"
    - "**/secrets/**"
features:
  jira:
    enabled: false
    baseUrl: ""
    token: ""
    email: ""
    projectKeys: []
  autoDescription:
    enabled: false
    overwriteExisting: false
    timeoutMs: 120000
  autoLabel:
    enabled: false
    verdictLabels: {}
    severityLabels: {}
    diffLabels: []
  slack:
    enabled: false
    webhookUrl: ""
    notifyOn:
      - error
      - request_changes
  audit:
    enabled: false
    maxEntries: 10000
    filePath: data/audit.json
    includeMetadata: true
    minSeverity: info
  autofix:
    enabled: false
    commandTrigger: ^\s*/fix\s*$
    autoApply: false
    maxTurns: 10
    timeoutMs: 300000
  usage:
    enabled: true
    dbPath: data/usage.db
    retentionDays: 90
    sessionTtlSeconds: 270
dashboard:
  port: 3001
  token: ""
rateLimit:
  defaultCooldownSeconds: 120
  spendingLimitCooldownSeconds: 3600
  maxEventHistory: 50
